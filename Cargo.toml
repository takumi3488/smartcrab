[workspace]
members = ["crates/smartcrab", "crates/smartcrab-cli"]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"
repository = "https://github.com/takumi3488/smartcrab"
license = "Apache-2.0"

[workspace.metadata.dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = ["shell", "homebrew"]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
]
tap = "takumi3488/homebrew-tap"
publish-jobs = ["homebrew", "./publish-crates"]

[profile.dist]
inherits = "release"

[profile.release]
codegen-units = 1
lto = true
strip = true
