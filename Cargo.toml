[workspace]
members = ["crates/smartcrab", "crates/smartcrab-cli"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/takumi3488/smartcrab"
version = "0.1.3"

[workspace.metadata.dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = ["shell", "homebrew"]
publish-jobs = ["homebrew"]
tap = "takumi3488/homebrew-tap"
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
]

[profile.dist]
inherits = "release"

[profile.release]
codegen-units = 1
lto = true
strip = true
