base_url = "https://smartcrabai.github.io/smartcrab/"
title = "SmartCrab Documentation"
description = "SmartCrab is a Rust framework implementing the Tool-to-AI paradigm"
theme = "goyo"
default_language = "en"
build_search_index = false
generate_feeds = false
generate_sitemap = true
minify_html = true

