[extra]
enable_custom_css = true
footer_html = "Powered by <a href='https://www.getzola.org'>Zola</a> and <a href='https://github.com/hahwul/goyo'>Goyo</a>"
edit_url = "https://github.com/smartcrabai/smartcrab/edit/main/docs/content"

nav = [
    { name = "Design Docs", url = "/design", type = "url", icon = "book" },
    { name = "Specification", url = "/spec", type = "url", icon = "code" },
    { name = "GitHub", url = "https://github.com/smartcrabai/smartcrab", type = "url", icon = "github" },
]

[extra.lang]
aliases = { en = "English", ja = "日本語" }

[extra.logo]
text = "SmartCrab"

[extra.theme]
colorset = "dark"
brightness = "normal"
disable_toggle = false
default_theme_dark = "goyo-dark"
default_theme_light = "goyo-light"

[extra.sidebar]
expand_depth = 2
disable_root_hide = false
enable_desktop_menu = true

[extra.share]
copy_url = false
x = false

