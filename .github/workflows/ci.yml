name: PR Auto-merge

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install taplo
        uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2
        with:
          tool: taplo-cli

      - name: Lint Cargo.toml
        run: taplo lint Cargo.toml

      - name: Check Cargo.toml formatting
        run: taplo fmt --check --option reorder_keys=true Cargo.toml

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install frontend dependencies
        if: hashFiles('crates/smartcrab-app/package.json') != ''
        working-directory: crates/smartcrab-app
        run: npm install

      - name: TypeScript type check
        if: hashFiles('crates/smartcrab-app/package.json') != ''
        working-directory: crates/smartcrab-app
        run: npx tsc --noEmit

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install frontend dependencies
        if: hashFiles('crates/smartcrab-app/package.json') != ''
        working-directory: crates/smartcrab-app
        run: npm install

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-rust

      - name: Run cargo check
        run: cargo check --all-features

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install frontend dependencies
        if: hashFiles('crates/smartcrab-app/package.json') != ''
        working-directory: crates/smartcrab-app
        run: npm install

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-rust

      - name: Run tests
        run: cargo test --all-features

  automerge:
    runs-on: ubuntu-latest
    needs: [lint, check, test]
    if: github.event.pull_request.user.login == 'renovate[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: automerge
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 # v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: "automerge"
