name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (Apple Silicon)
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          # macOS (Intel)
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          # Linux x86_64
          - platform: ubuntu-latest
            args: ''
          # Linux ARM64
          - platform: ubuntu-24.04-arm
            args: ''
          # Windows x86_64
          - platform: windows-latest
            args: ''
          # Windows ARM64
          - platform: windows-11-arm
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # macOS runners need cross-compile targets for both architectures
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Tauri system dependencies (Linux)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        working-directory: crates/smartcrab-app
        run: npm install

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/smartcrab-app
          tagName: ${{ github.ref_name }}
          releaseName: 'SmartCrab ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Ad-hoc sign the .app so macOS shows "unidentified developer" instead of "damaged"
      # (xattr -cr /Applications/SmartCrab.app is still needed after install)
      - name: Ad-hoc sign and re-upload macOS app
        if: contains(matrix.args, 'apple-darwin')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_DIR="crates/smartcrab-app/src-tauri/target"
          APP=$(find "$TARGET_DIR" -path "*/release/bundle/macos/*.app" -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then
            echo "Warning: no .app bundle found, skipping ad-hoc signing"
            exit 0
          fi
          codesign --force --deep --sign - "$APP" || { echo "Error: codesign failed" >&2; exit 1; }

          DMG=$(find "$TARGET_DIR" -path "*/release/bundle/dmg/*.dmg" -maxdepth 6 | head -1)
          if [ -n "$DMG" ]; then
            hdiutil create -volname "SmartCrab" -srcfolder "$APP" -ov -format UDZO "$DMG"
            gh release upload "${{ github.ref_name }}" "$DMG" --clobber
          fi
